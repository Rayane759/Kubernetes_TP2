apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-python-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api-python.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-python
            port:
              number: 80